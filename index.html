<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Lista de Tarefas</h1>

        <div class="form">
            <input type="text" id="descricao" placeholder="Digite a tarefa...">

            <select id="prioridade">
                <option value="">Sem prioridade</option>
                <option value="alta">Alta</option>
                <option value="media">Média</option>
                <option value="baixa">Baixa</option>
            </select>

            <button onclick="adicionarTarefa()">Adicionar</button>
        </div>

        <div class="listas">
            <div>
                <h2>Alta</h2>
                <div id="listaAlta" class="lista"></div>
            </div>

            <div>
                <h2>Média</h2>
                <div id="listaMedia" class="lista"></div>
            </div>

            <div>
                <h2>Baixa</h2>
                <div id="listaBaixa" class="lista"></div>
            </div>

            <div>
                <h2>Sem prioridade</h2>
                <div id="listaDefault" class="lista"></div>
            </div>
        </div>
    </div>

    <script src="code.js"></script>
</body>
</html>
